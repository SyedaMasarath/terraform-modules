name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC

jobs:
  # ── Trivy misconfiguration scan ───────────────────────────────────────────
  trivy:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # needed to upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── Checkov policy scan ───────────────────────────────────────────────────
  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          # Intentional suppressions (see .trivyignore for rationale):
          # CKV2_AWS_12 — default SG not used; we create dedicated SGs per module
          # CKV_AWS_130 — public subnet map_public_ip required for NAT/ALB subnets
          # CKV_AWS_25  — egress 0.0.0.0/0 required so nodes can reach ECR/API
          # CKV_AWS_91  — WAF CWL log group; KMS overkill for access logs
          # CKV_AWS_338 — same: WAF CWL log group KMS encryption
          skip_check: CKV2_AWS_12,CKV_AWS_130,CKV_AWS_25,CKV_AWS_91,CKV_AWS_338
          soft_fail: true

      - name: Upload Checkov SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov
